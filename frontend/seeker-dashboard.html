<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Dashboard — Job Portal</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<nav>
  <div class="nav-logo">Job<span>Portal</span></div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="jobs.html">Browse Jobs</a>
    <a href="seeker-dashboard.html" class="active">Dashboard</a>
    <a href="#" class="btn-nav" onclick="logout()">Logout</a>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <h1>Welcome, <span id="userName" style="color:var(--amber)">...</span></h1>
    <p>Manage your applications, saved jobs, and profile</p>
  </div>
</div>

<main>
  <div class="container">
    <div class="dashboard-layout">

      <!-- SIDEBAR -->
      <div class="sidebar">
        <a class="sidebar-item active" onclick="showSection('applications')" href="#">My Applications</a>
        <a class="sidebar-item" onclick="showSection('bookmarks')" href="#">Saved Jobs</a>
        <a class="sidebar-item" onclick="showSection('profile')" href="#">Edit Profile</a>
      </div>

      <!-- CONTENT -->
      <div>

        <!-- APPLICATIONS -->
        <div id="sec-applications">
          <div class="card">
            <h3 style="color:var(--green-dark); margin-bottom:20px;">My Applications</h3>
            <div id="appsList"><p style="color:var(--gray)">Loading...</p></div>
          </div>
        </div>

        <!-- BOOKMARKS -->
        <div id="sec-bookmarks" style="display:none">
          <div class="card">
            <h3 style="color:var(--green-dark); margin-bottom:20px;">Saved Jobs</h3>
            <div id="bookmarksList"><p style="color:var(--gray)">Loading...</p></div>
          </div>
        </div>

        <!-- PROFILE -->
        <div id="sec-profile" style="display:none">
          <div class="card">
            <h3 style="color:var(--green-dark); margin-bottom:20px;">Edit Profile</h3>
            <div id="profileAlert" class="alert"></div>
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="profName"/>
            </div>
            <div class="form-group">
              <label>Bio</label>
              <textarea id="profBio" placeholder="Tell employers about yourself..."></textarea>
            </div>
            <div class="form-group">
              <label>Skills</label>
              <input type="text" id="profSkills" placeholder="e.g. Python, React, SQL"/>
            </div>
            <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
          </div>
        </div>

      </div>
    </div>
  </div>
</main>

<footer>
  <p>© 2026 <span>Job Portal System</span></p>
</footer>

<script src="js/api.js"></script>
<script>
  if (!isLoggedIn() || getRole() !== "jobseeker") {
    window.location.href = "login.html";
  }

  document.getElementById("userName").textContent = getName();

  function showSection(name) {
    ["applications","bookmarks","profile"].forEach(s => {
      document.getElementById(`sec-${s}`).style.display = s === name ? "block" : "none";
    });
    document.querySelectorAll(".sidebar-item").forEach((el, i) => {
      el.classList.toggle("active", ["applications","bookmarks","profile"][i] === name);
    });
    if (name === "applications") loadApplications();
    if (name === "bookmarks")   loadBookmarks();
    if (name === "profile")     loadProfile();
  }

  function badgeClass(status) {
    return { Pending:"badge-pending", Reviewed:"badge-reviewed", Shortlisted:"badge-shortlisted", Rejected:"badge-rejected" }[status] || "badge-pending";
  }

  async function loadApplications() {
    const el = document.getElementById("appsList");
    try {
      const apps = await Applications.mine();
      if (apps.length === 0) { el.innerHTML = "<p style='color:var(--gray)'>You haven't applied to any jobs yet. <a href='jobs.html' style='color:var(--green-mid)'>Browse Jobs</a></p>"; return; }
      el.innerHTML = `<div class="table-wrapper"><table>
        <thead><tr><th>Job Title</th><th>Applied On</th><th>Status</th></tr></thead>
        <tbody>${apps.map(a => `
          <tr>
            <td><a href="job-detail.html?id=${a.job_id}" style="color:var(--green-mid); font-weight:600;">${a.job_title}</a></td>
            <td style="color:var(--gray)">${new Date(a.applied_at).toLocaleDateString()}</td>
            <td><span class="badge ${badgeClass(a.status)}">${a.status}</span></td>
          </tr>`).join("")}
        </tbody></table></div>`;
    } catch(e) { el.innerHTML = "<p style='color:var(--gray)'>Could not load applications.</p>"; }
  }

  async function loadBookmarks() {
    const el = document.getElementById("bookmarksList");
    try {
      const bms = await Bookmarks.mine();
      if (bms.length === 0) { el.innerHTML = "<p style='color:var(--gray)'>No saved jobs yet.</p>"; return; }
      el.innerHTML = bms.map(b => `
        <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--green-light);">
          <a href="job-detail.html?id=${b.job_id}" style="color:var(--green-dark); font-weight:600;">${b.job_title}</a>
          <span style="color:var(--gray); font-size:0.82rem;">Saved ${new Date(b.saved_at).toLocaleDateString()}</span>
        </div>`).join("");
    } catch(e) { el.innerHTML = "<p style='color:var(--gray)'>Could not load bookmarks.</p>"; }
  }

  async function loadProfile() {
    try {
      const user = await User.me();
      document.getElementById("profName").value   = user.full_name  || "";
      document.getElementById("profBio").value    = user.bio        || "";
      document.getElementById("profSkills").value = user.skills     || "";
    } catch(e) {}
  }

  async function saveProfile() {
    const alertEl = document.getElementById("profileAlert");
    try {
      await User.update({
        full_name: document.getElementById("profName").value.trim(),
        bio:       document.getElementById("profBio").value.trim(),
        skills:    document.getElementById("profSkills").value.trim(),
      });
      alertEl.textContent = "Profile updated successfully!";
      alertEl.className = "alert alert-success show";
      localStorage.setItem("full_name", document.getElementById("profName").value.trim());
      document.getElementById("userName").textContent = document.getElementById("profName").value.trim();
    } catch(e) {
      alertEl.textContent = e.message;
      alertEl.className = "alert alert-error show";
    }
  }

  loadApplications();
</script>
</body>
</html>
